spring:
  application:
    name: paystream
  profiles:
    active: dev
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/paystream
    username: paystream
    password: paystream
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8080

logging:
  level:
    com.paystream: DEBUG
    org.springframework: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized